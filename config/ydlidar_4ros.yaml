ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ydlidar
    frame_id: laser
    ignore_array: ""
    baudrate: 512000      # EAI 4ROS: 512000 baud
    lidar_type: 0         # TYPE_TOF — 4ROS is a TOF lidar, not triangulation
    device_type: 0        # YDLIDAR_TYPE_SERIAL
    sample_rate: 20       # 4ROS: 20K samples/s
    abnormal_check_count: 4
    resolution_fixed: true
    reversion: false
    inverted: true
    auto_reconnect: true
    isSingleChannel: false
    intensity: false
    support_motor_dtr: true   # 4ROS requires DTR to spin motor
    angle_max: 180.0
    angle_min: -180.0
    range_max: 64.0
    range_min: 0.01
    frequency: 10.0
    invalid_range_is_inf: false
