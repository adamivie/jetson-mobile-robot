slam_toolbox:
  ros__parameters:
    # Mode: async online mapping
    mode: mapping

    # Lidar topic — matches ydlidar_ros2_driver_node output
    scan_topic: /scan
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    use_scan_matching: true
    use_scan_barycenter: true

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Map update / resolution
    resolution: 0.05           # 5cm grid cells — good for indoor corridors
    max_laser_range: 30.0      # TG30 max range is 30m
    # No wheel encoders — odom→base_link is a static identity TF so the robot
    # never appears to move in the odom frame. Set both thresholds to 0 so
    # slam_toolbox processes every scan via pure scan-matching (works great indoors).
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    map_update_interval: 5.0   # seconds between map saves
    enable_interactive_mode: false

    # Throttling
    throttle_scans: 1
    transform_publish_period: 0.02   # 50Hz TF

    # Loop closure
    loop_search_distance: 5.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coeff: 3.0
    loop_match_min_response_coarse: 0.35
    loop_match_min_response_fine: 0.45

    # Scan matcher
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349   # 0.2 degrees
    coarse_search_angle_offset: 0.349   # 20 degrees
    coarse_angle_resolution: 0.0349     # 2 degrees
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
