# MAVROS config for ArduRover on Pixhawk 6X
# ArduRover skid-steer, connected via USB /dev/pixhawk

mavros:
  ros__parameters:
    # Connection
    fcu_url: "/dev/pixhawk:115200"
    gcs_url: ""
    target_system_id: 1
    target_component_id: 1
    fcu_protocol: "v2.0"

    # Plugin allowlist — load only what we need.
    # Eliminates the "multiple channels same topic different schema" Foxglove warnings
    # caused by multiple MAVROS plugins registering on the same topic name.
    plugin_allowlist:
      - sys_status       # /mavros/state, /mavros/battery, /mavros/sys_status
      - imu              # /mavros/mavros/data (IMU), /mavros/mavros/data_raw
      - local_position   # /mavros/local_position/pose, TF map→base_link
      - rc_io            # RC override (used by mecanum_drive_node)
      - command          # arm/disarm/mode commands
      - param            # parameter get/set
      - setpoint_velocity # /mavros/mavros/cmd_vel (velocity setpoints)
      - vfr_hud          # /mavros/vfr_hud (speed, heading, throttle)

    # Frames
    local_position:
      frame_id: "map"
      tf:
        send: true
        frame_id: "map"
        child_frame_id: "base_link"

    global_position:
      frame_id: "map"
      tf:
        send: false

    imu:
      frame_id: "base_link"
